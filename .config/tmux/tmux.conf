# === macOS Tmux Configuration ===

# --- Core Behavior ---
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Set the default terminal for 256 color and RGB support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Move status bar to the top
set-option -g status-position top

# Start window and pane numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Key Bindings ---
# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes and open in the same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Your custom script binding
bind-key -r o run-shell "tmux neww tmux-cht.sh"

# --- macOS Clipboard Integration ---
# Use vim-like keybindings in copy mode
set-window-option -g mode-keys vi

# Use pbcopy to pipe to the macOS system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# --- TPM Plugin List ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'uhs-robert/tmux-oasis'

# --- Plugin Configurations ---
set -g @continuum-restore 'on'
set -g @floax-bind 'C-b'
set -g @floax-bind-menu 'C-B'
set -g @oasis_flavor "lagoon"  # Optional: defaults to lagoon

# --- Initialize TPM (MUST BE THE LAST LINE) ---
run '~/.tmux/plugins/tpm/tpm'

# Override status-right AFTER TPM loads (oasis theme)
set -g status-right ''
